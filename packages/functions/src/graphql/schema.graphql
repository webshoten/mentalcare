

  enum CounselorAvailability {
    AVAILABLE   # 今すぐ可
    SOON        # 15分後〜
    LATER       # 30分後〜
    OFFLINE     # オフライン
  }

  type Counselor {
    id: ID!
    name: String!
    photoUrl: String
    rating: Float
    specialty: String
    experienceYears: Int
  }

  type CounselorStats {
    total: Int!
  }

  enum AppointmentStatus {
    OPEN     # カウンセラーが枠作成・相談者募集中
    WAITING  # 相談者がマッチング済み・通話待ち
    ACTIVE   # 通話中
    ENDED    # 終了
  }

  type Appointment {
    id: ID!
    counselorId: String!
    status: AppointmentStatus!
    scheduledStart: String!   # HH:MM (JST)
    scheduledEnd: String!     # HH:MM (JST)
    availability: CounselorAvailability!
    availableAt: String       # SOON / LATER のとき対応開始予定時刻（ISO8601）
    createdAt: String!
    endedAt: String
    counselor: Counselor
  }

  type SeedResult {
    seeded: Int!
  }

  type ChimeMediaPlacement {
    audioHostUrl: String!
    audioFallbackUrl: String!
    signalingUrl: String!
    turnControlUrl: String!
  }

  type ChimeMeeting {
    meetingId: String!
    mediaPlacement: ChimeMediaPlacement!
    mediaRegion: String!
  }

  type ChimeAttendee {
    attendeeId: String!
    externalUserId: String!
    joinToken: String!
  }

  type JoinChimeMeetingResult {
    meeting: ChimeMeeting!
    attendee: ChimeAttendee!
  }

  type ChimeAttendeeInfo {
    attendeeId: String!
    externalUserId: String!
  }

  type ChimeSessionStatus {
    sessionId: String!
    appointmentId: String!
    talkerId: String!
    sessionStatus: SessionStatus!
    chimeMeetingId: String
    attendees: [ChimeAttendeeInfo!]
  }

  type Talker {
    id: ID!
    name: String!
    photoUrl: String
    createdAt: String!
  }

  enum SessionStatus {
    ACTIVE
    ENDED
  }

  type Session {
    id: ID!
    appointmentId: String!
    talkerId: String!
    chimeMeetingId: String
    status: SessionStatus!
    startedAt: String!
    endedAt: String
  }

  type Query {
    # 相談者一覧（デバッグ用）
    talkers: [Talker!]!
    # セッション一覧（デバッグ用）
    sessions: [Session!]!
    # バブル画面用：ENDED 以外の全 Appointment（表示制御はフロント側）
    openAppointments: [Appointment!]!
    # カウンセラーの現在のアポイントメント（OPEN / WAITING / ACTIVE）
    counselorAppointment(counselorId: ID!): Appointment
    # デバッグ用
    appointments: [Appointment!]!
    appointment(id: ID!): Appointment
    # カウンセラー情報
    counselors: [Counselor!]!
    counselor(id: ID!): Counselor
    counselorStats: CounselorStats!
    # Chime 接続状態監視（デバッグ用）
    chimeStatus: [ChimeSessionStatus!]!
  }

  type Mutation {
    # カウンセラーが枠を作成 → OPEN
    createAppointment(counselorId: ID!, scheduledStart: String!, scheduledEnd: String!): Appointment!
    # 入室（OPEN→WAITING / WAITING→ACTIVE。ACTIVE 時に Session 作成 + Chime Meeting 作成）
    joinAppointment(appointmentId: ID!, talkerId: ID): Appointment!
    # 通話終了 → ENDED（TTL セット）
    endAppointment(appointmentId: ID!): Appointment!
    # 待機中離脱 → OPEN（相談者が接続待ちのまま離れたときに枠を解放）
    leaveAppointment(appointmentId: ID!): Appointment!
    # デバッグ用：カウンセラーデータのシード
    seedDatabase: SeedResult!
    # デバッグ用：Chime ミーティング作成
    createChimeMeeting: ChimeMeeting!
    # デバッグ用：Chime アテンディー作成
    createChimeAttendee(meetingId: String!): ChimeAttendee!
    # Appointment に紐づく Chime Meeting に Attendee として参加（再接続にも使用）
    joinChimeMeeting(appointmentId: ID!): JoinChimeMeetingResult!
    # デバッグ用：Appointment と紐づく Chime Meeting を削除
    deleteAppointment(appointmentId: ID!): Boolean!
  }
